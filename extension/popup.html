<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeliCalc Addon</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <section class="top">
      <strong id="siteBadge">Sitio</strong>
      <div class="top-actions">
        <button id="clearWorkBtn" class="secondary" type="button">Limpiar</button>
        <button id="extractBtn" type="button">Extraer</button>
      </div>
    </section>

    <section class="panel">
      <details>
        <summary>Configuracion</summary>
        <label>OpenAI API key
          <input id="openaiApiKey" type="password" autocomplete="off" placeholder="sk-...">
        </label>
        <label>Modelo
          <input id="openaiModel" type="text" value="gpt-5.2">
        </label>
        <div class="grid">
          <label>M3 barco USD
            <input id="seaM3Price" type="number" value="0">
          </label>
          <label>Ad valorem %
            <input id="adValoremPercent" type="number" value="6" step="0.01">
          </label>
        </div>
        <label>Manejo UPS USD
          <input id="handlingFee" type="number" value="0" readonly>
        </label>
        <div class="grid">
          <label>DHL USD/kg
            <input id="dhlRateKg" type="number" value="0">
          </label>
          <label>UPS USD/kg
            <input id="upsRateKg" type="number" value="0">
          </label>
          <label>FedEx USD/kg
            <input id="fedexRateKg" type="number" value="0">
          </label>
        </div>
        <button id="saveSettingsBtn" type="button">Guardar configuracion</button>
      </details>
    </section>

    <section class="panel">
      <h2>Producto</h2>
      <label>Precio producto
        <input id="productPrice" type="number" min="0" step="0.01">
      </label>
      <div class="grid">
        <label>Moneda
          <input id="currency" type="text" value="USD">
        </label>
        <label>USD a CLP
          <input id="usdToClp" type="number" value="950">
        </label>
      </div>
      <button id="refreshDollarBtn" class="secondary" type="button">Actualizar dolar</button>
      <div class="grid">
        <label>Cantidad
          <input id="quantity" type="number" value="1" min="1" step="1">
        </label>
        <label>Peso kg/u
          <input id="weightKg" type="number" min="0" step="0.01">
        </label>
      </div>
      <div class="grid dims">
        <label>L cm
          <input id="lengthCm" type="number" min="0" step="0.01">
        </label>
        <label>A cm
          <input id="widthCm" type="number" min="0" step="0.01">
        </label>
        <label>H cm
          <input id="heightCm" type="number" min="0" step="0.01">
        </label>
      </div>
    </section>

    <section class="panel" id="shippingPanel">
      <h2>Envio</h2>
      <div class="result-grid">
        <div>
          <span>CBM unidad</span>
          <strong id="unitCbm">0</strong>
        </div>
        <div>
          <span>Unidades/m3</span>
          <strong id="unitsPerM3">0</strong>
        </div>
      </div>
      <div class="result-grid">
        <div>
          <span>Valor m3 barco</span>
          <strong id="seaM3Clp">$0</strong>
        </div>
        <div>
          <span>Barco total</span>
          <strong id="seaTotal">$0</strong>
        </div>
      </div>
      <div class="result-grid">
        <div>
          <span>Unitario barco</span>
          <strong id="seaUnit">$0</strong>
        </div>
        <div>
          <span>Unitario avion</span>
          <strong id="airBest">$0</strong>
        </div>
      </div>
      <div id="airRows" class="mini-list"></div>
      <div class="breakdown">
        <h3>Desglose unitario barco</h3>
        <div><span>Producto</span><strong id="seaProductUnit">$0</strong></div>
        <div><span>Flete barco</span><strong id="seaFreightUnit">$0</strong></div>
        <div><span>Ad valorem</span><strong id="seaAdValoremUnit">$0</strong></div>
        <div><span>Manejo</span><strong id="seaHandlingUnit">$0</strong></div>
        <div><span>IVA</span><strong id="seaIvaUnit">$0</strong></div>
        <div class="total"><span>Total unitario</span><strong id="seaBreakdownTotal">$0</strong></div>
      </div>
    </section>

    <section class="actions">
      <button id="calcSeaBtn" type="button">Abrir barco</button>
      <button id="calcAirBtn" type="button">Abrir avion</button>
    </section>

    <section class="panel notes">
      <div id="status">Listo.</div>
      <div id="llmNotes"></div>
    </section>

    <section class="panel">
      <h2>Venta objetivo</h2>
      <label>Nombre sugerido
        <input id="suggestedName" type="text" placeholder="Extrae con IA para generar nombre">
      </label>
      <div class="grid">
        <label>Precio venta CLP
          <input id="targetSalePrice" type="number" min="0" step="1">
        </label>
        <label>Ganancia %
          <input id="targetMarginPercent" type="number" min="0" step="0.01" value="40">
        </label>
      </div>
      <label>Comparar con
        <select id="landedMode">
          <option value="sea">Unitario barco</option>
          <option value="air">Unitario avion</option>
        </select>
      </label>
      <div class="result-grid">
        <div>
          <span>Ganancia estimada</span>
          <strong id="targetProfit">$0</strong>
        </div>
        <div>
          <span>Max. puesto Chile</span>
          <strong id="maxLandedCost">$0</strong>
        </div>
      </div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
